<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-box {
            background: #1a1a1a;
            padding: 35px;
            border-radius: 8px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            border: 1px solid #333;
        }
        h2 {
            color: #e50914;
            margin-bottom: 25px;
            font-size: 28px;
        }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: none;
            border-radius: 4px;
            background: #333;
            color: #fff;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            background: #444;
            border-bottom: 2px solid #e50914;
        }
        button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            background: #e50914;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #f40612;
        }
        #error {
            color: #ff5555;
            margin-top: 15px;
            display: none;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>MY PORTFOLIO</h2>
        <input type="text" id="username" placeholder="Enter Username">
        <input type="password" id="password" placeholder="Enter Password">
        <button onclick="login()">Sign In</button>
        <div id="error">❌ Incorrect username or password!</div>
    </div>

    <script>
        function login() {
            const user = document.getElementById("username").value.trim();
            const pass = document.getElementById("password").value;
            const errorBox = document.getElementById("error");

            // ✅ JOHN'S LOGIN
            if (user === "john" && pass === "1234") {
                alert("✅ Login Successful! Redirecting to John's Profile...");
                localStorage.setItem("loggedin", "true");
                // Correct path: profilejohn.html
                window.location.href = "profilejohn.html";
            }

            // ✅ NICOLE'S LOGIN
            else if (user === "nicole" && pass === "1234") {
                alert("✅ Login Successful! Redirecting to Nicole's Profile...");
                localStorage.setItem("loggedin", "true");
                // Correct path: profilenicole.html
                window.location.href = "profilenicole.html";
            }

            // ❌ Wrong details
            else {
                errorBox.style.display = "block";
            }
        }
    </script>
</body>
</html>
