<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Sign In</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            /* Removed the broken external link, used solid black + gradient overlay instead */
            background: #000;
            position: relative;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Dark gradient overlay like Netflix */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8));
            z-index: 1;
        }

        /* Official Netflix logo style */
        .logo {
            position: absolute;
            top: 25px;
            left: 30px;
            color: #e50914;
            font-size: 2.3rem;
            font-weight: 900;
            letter-spacing: 1px;
            z-index: 2;
            text-decoration: none;
        }

        .login-box {
            position: relative;
            z-index: 2;
            background: rgba(0, 0, 0, 0.8);
            padding: 60px 68px 40px;
            border-radius: 4px;
            width: 100%;
            max-width: 450px;
        }

        .login-box h1 {
            color: #fff;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 28px;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            margin-bottom: 16px;
            border: none;
            border-radius: 4px;
            background: #333;
            color: #fff;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            background: #444;
            box-shadow: 0 0 0 2px #e50914;
        }

        input::placeholder {
            color: #b3b3b3;
        }

        button {
            width: 100%;
            padding: 14px;
            margin: 24px 0 12px;
            background: #e50914;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #f40612;
        }

        .help-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            color: #b3b3b3;
        }

        .help-row a {
            color: #b3b3b3;
            text-decoration: none;
        }

        .help-row a:hover {
            text-decoration: underline;
        }

        #error {
            color: #e87c03;
            margin-top: 15px;
            display: none;
            font-size: 0.95rem;
            padding: 8px 0;
        }
    </style>
</head>
<body>

    <!-- Netflix Logo -->
    <div class="logo">NETFLIX</div>

    <div class="login-box">
        <h1>Sign In</h1>
        <input type="text" id="username" placeholder="Email or phone number">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Sign In</button>
        <div class="help-row">
            <label><input type="checkbox"> Remember me</label>
            <a href="#">Need help?</a>
        </div>
        <div id="error">❌ Incorrect username or password. Please try again.</div>
    </div>

    <script>
        function login() {
            const user = document.getElementById("username").value.trim();
            const pass = document.getElementById("password").value;
            const errorBox = document.getElementById("error");

            // ✅ Your working login details
            if (user === "john" && pass === "1234") {
                alert("✅ Signing in...");
                window.location.href = "profilejohn.html";
            }
            else if (user === "nicole" && pass === "1234") {
                alert("✅ Signing in...");
                window.location.href = "profilenicole.html";
            }
            else {
                errorBox.style.display = "block";
            }
        }
    </script>

</body>
</html>
